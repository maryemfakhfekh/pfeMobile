name: gestion_stagiaires_app
description: "Projet de gestion des stagiaires - Sprint 1"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- NAVIGATION (AutoRoute) ---
  auto_route: ^7.9.0

  # --- GESTION D'ÉTAT (BLoC) ---
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # --- APPELS API (Dio) ---
  dio: ^5.4.0

  # --- MAPPING JSON (Models) ---
  json_annotation: ^4.9.0

  # --- INJECTION DE DÉPENDANCES (Core/DI) ---
  get_it: ^7.6.0

  # --- STOCKAGE SÉCURISÉ (JWT Token) ---
  flutter_secure_storage: ^9.0.0
  intl: ^0.20.2
  http: ^1.1.0
  file_picker: ^8.0.0

  # --- LIENS EXTERNES ---
  url_launcher: ^6.2.6
  flutter_native_splash: ^2.4.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10

  # ✅ Ouverture et téléchargement fichiers
  open_file: ^3.3.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # --- GÉNÉRATEURS DE CODE ---
  build_runner: ^2.4.8
  auto_route_generator: ^7.3.2
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/